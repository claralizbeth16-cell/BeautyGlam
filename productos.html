<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Beauty Glam</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<script>
// Verificar que el usuario haya iniciado sesión
if (localStorage.getItem("sesion") !== "activa") {
    alert("Debes iniciar sesión para ver los productos.");
    window.location.href = "login.html";
}
</script>

<header>
    <h1>💖 Beauty Glam</h1>
</header>

<nav>
    <a href="carrito.html">🛒 Ver Carrito</a>
    <a href="#" onclick="cerrarSesion()">🚪 Cerrar Sesión</a>
</nav>

<div class="contenedor">

    <h2>Nuestros Productos</h2>

    <div class="productos">

        <div class="producto">
            <img src="imagenes/base.jpg" alt="Base Líquida">
            <h3>Base Líquida</h3>
            <p>$12</p>
            <button onclick="agregarCarrito('Base Líquida',12)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagenes/labial.jpg" alt="Labial">
            <h3>Labial Mate</h3>
            <p>$8</p>
            <button onclick="agregarCarrito('Labial Mate',8)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagenes/rubor.jpg" alt="Rubor">
            <h3>Rubor</h3>
            <p>$10</p>
            <button onclick="agregarCarrito('Rubor',10)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagenes/delineador.jpg" alt="Delineador">
            <h3>Delineador</h3>
            <p>$6</p>
            <button onclick="agregarCarrito('Delineador',6)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagenes/mascara.jpg" alt="Máscara">
            <h3>Máscara de pestañas</h3>
            <p>$9</p>
            <button onclick="agregarCarrito('Máscara de pestañas',9)">Agregar al carrito</button>
        </div>

        <div class="producto">
            <img src="imagenes/paleta.jpg" alt="Paleta">
            <h3>Paleta de Sombras</h3>
            <p>$18</p>
            <button onclick="agregarCarrito('Paleta de Sombras',18)">Agregar al carrito</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
