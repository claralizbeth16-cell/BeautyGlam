<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="contenedor">

<h1>🔐 Iniciar Sesión</h1>

<input type="email" id="correo" placeholder="Correo electrónico">

<br><br>

<input type="password" id="password" placeholder="Contraseña">

<br><br>

<button onclick="iniciarSesion()">
Ingresar
</button>

<br><br>

<p>¿No tienes una cuenta?</p>

<a href="crear-cuenta.html">
<button type="button">
Crear Cuenta
</button>
</a>

</div>

<script>

function iniciarSesion(){

let correo=document.getElementById("correo").value;
let password=document.getElementById("password").value;

let correoGuardado=localStorage.getItem("correo");
let passwordGuardada=localStorage.getItem("password");

if(correoGuardado==null){

alert("Aún no tienes una cuenta. Debes registrarte.");

window.location.href="crear-cuenta.html";

return;

}

if(correo==correoGuardado && password==passwordGuardada){

localStorage.setItem("sesion","activa");

window.location.href="productos.html";

}else{

alert("Correo o contraseña incorrectos.");

}

}

</script>

</body>
</html>
