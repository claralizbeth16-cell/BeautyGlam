<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1>🔐 Iniciar Sesión</h1>

    <input type="email" id="correo" placeholder="Correo"><br><br>

    <input type="password" id="password" placeholder="Contraseña"><br><br>

    <button onclick="iniciarSesion()">
        Ingresar
    </button>

</div>

<script>

function iniciarSesion(){

    let correo = document.getElementById("correo").value;
    let password = document.getElementById("password").value;

    let correoGuardado = localStorage.getItem("correo");
    let passwordGuardada = localStorage.getItem("password");

    if(correo === correoGuardado &&
       password === passwordGuardada){

        localStorage.setItem("sesion","activa");

        window.location.href="productos.html";

    }else{

        alert("Correo o contraseña incorrectos");

    }
}

</script>

</body>
</html>
