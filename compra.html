<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta - Beauty Glam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1>💖 Crear Cuenta</h1>

    <input type="text" id="nombre" placeholder="Nombre completo"><br><br>

    <input type="email" id="correo" placeholder="Correo"><br><br>

    <input type="password" id="password" placeholder="Contraseña"><br><br>

    <button onclick="registrar()">
        Registrarse
    </button>

    <br><br>

    <a href="login.html">
        ¿Ya tienes cuenta? Inicia sesión
    </a>

</div>

<script>
function registrar(){

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let password = document.getElementById("password").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("correo", correo);
    localStorage.setItem("password", password);

    alert("Cuenta creada correctamente");

    window.location.href="login.html";
}
</script>

</body>
</html>
