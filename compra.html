<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Beauty Glam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if(localStorage.getItem("sesion") !== "activa"){
    alert("Debes iniciar sesión.");
    window.location.href = "login.html";
}
</script>

<header>
    <h1>💖 Beauty Glam</h1>
</header>

<div class="formulario">

    <h2>Finalizar Compra</h2>

    <input type="text" id="nombre" placeholder="Nombre completo">

    <input type="text" id="direccion" placeholder="Dirección">

    <input type="text" id="telefono" placeholder="Teléfono">

    <select id="metodoPago">
        <option value="">Seleccione un método de pago</option>
        <option>Tarjeta Débito</option>
        <option>Tarjeta Crédito</option>
        <option>Transferencia Bancaria</option>
        <option>Efectivo Contra Entrega</option>
    </select>

    <br><br>

    <button onclick="confirmarCompra()">
        Confirmar Compra
    </button>

    <br><br>

    <a href="carrito.html">⬅ Volver al carrito</a>

</div>

<script>

function confirmarCompra(){

    let nombre = document.getElementById("nombre").value;
    let direccion = document.getElementById("direccion").value;
    let telefono = document.getElementById("telefono").value;
    let pago = document.getElementById("metodoPago").value;

    if(nombre=="" || direccion=="" || telefono=="" || pago==""){

        alert("Por favor complete todos los datos.");

        return;

    }

    alert("🎉 ¡Gracias por comprar en Beauty Glam!\n\nTu pedido fue realizado correctamente.");

    localStorage.removeItem("carrito");

    window.location.href="productos.html";

}

</script>

</body>
</html>
